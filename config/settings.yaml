defaults:
  environment: development
  data_root: data
  log_level: INFO
  broker_mode: paper
  collector_enabled: false
  training_enabled: true
  backtest_enabled: true
  safe_to_trade: false
  ib_host: 127.0.0.1
  ib_port: 4002
  ib_client_id: 1
  ib_ui_client_id: 101
  ib_collector_client_id: 201
  ib_exchange: SMART
  ib_currency: USD
  ib_account_summary_group: All
  ib_request_timeout_seconds: 15
  ib_order_follow_up_seconds: 5
  timezone: America/New_York
  paths:
    raw_dir: data/raw
    market_raw_dir: data/raw/market
    processed_dir: data/processed
    feature_dir: data/features
    meta_dir: data/meta
    model_dir: data/models
    model_artifacts_dir: data/models/artifacts
    log_dir: data/logs
    report_dir: data/reports
    sqlite_backup_dir: data/meta/sqlite_backups
    sync_report_dir: data/reports/sync
    import_root: imports/from_pc2
    import_market_dir: imports/from_pc2/raw/market
    import_meta_dir: imports/from_pc2/meta
    import_log_dir: imports/from_pc2/logs
    transfer_log_path: imports/from_pc2/transfer_log.jsonl
    transfer_report_dir: data/reports/lan_sync
    runtime_db_path: data/processed/runtime/microalpha.db
    log_file: data/logs/microalpha.log
    execution_log_file: data/reports/executions.csv
    model_registry_path: data/models/artifacts/registry.json
  session:
    orb_start: "09:30"
    orb_end: "09:45"
    primary_session_end: "11:30"
    secondary_session_start: "13:30"
    secondary_session_end: "15:00"
    enable_secondary_session: false
    flatten_before_close_minutes: 5
    regular_market_open: "09:30"
    regular_market_close: "16:00"
  trading:
    default_order_quantity: 1
    dry_run: true
    safe_to_trade: false
    allow_shorts: false
    data_mode: paper_or_local
    allow_session_execution: false
    entry_limit_buffer_bps: 2.0
    cost_buffer_bps: 2.5
    max_spread_bps: 8.0
    max_hold_minutes: 30
  models:
    model_prob_threshold: 0.58
    target_horizon_minutes: 3
    baseline_weight: 0.4
    deep_weight: 0.6
    sequence_length: 16
  ui:
    host: 127.0.0.1
    port: 8501
    title: MicroAlpha IBKR
  collector:
    mode: snapshot_polling
    poll_interval_seconds: 5.0
    flush_interval_seconds: 30.0
    batch_size: 50
    reconnect_delay_seconds: 10.0
    max_reconnect_attempts: 5
    health_log_interval_seconds: 60.0
  feature_pipeline:
    gap_threshold_seconds: 120
    max_abs_spread_bps: 250.0
    forward_fill_limit: 2
    drop_outside_regular_hours: true
    rolling_short_window: 5
    rolling_medium_window: 15
    rolling_long_window: 30
    vwap_window: 30
    volume_window: 30
    label_horizon_rows: 1
    train_split_ratio: 0.8
    default_feature_set: hybrid_intraday
    validation_max_nan_ratio: 0.35
  lan_sync:
    pc2_network_root:
    source_market_subdir: data/raw/market
    source_meta_subdir: data/meta
    source_log_subdir: data/logs
    include_raw: true
    include_meta: true
    include_logs: false
    dry_run: false
    overwrite_policy: if_newer
    validate_parquet: true
    allowed_symbols: [SPY]

environments:
  development:
    collector_enabled: false
    training_enabled: true
    backtest_enabled: true
    safe_to_trade: false
    broker_mode: paper
    collector:
      poll_interval_seconds: 10.0
      flush_interval_seconds: 30.0
      batch_size: 20
    feature_pipeline:
      gap_threshold_seconds: 180
      rolling_short_window: 5
      rolling_medium_window: 15
      rolling_long_window: 30
    lan_sync:
      include_raw: true
      include_meta: true
      include_logs: false
      dry_run: false
  deploy:
    collector_enabled: true
    training_enabled: false
    backtest_enabled: false
    safe_to_trade: false
    broker_mode: paper
    log_level: INFO
    collector:
      poll_interval_seconds: 5.0
      flush_interval_seconds: 20.0
      batch_size: 50
    feature_pipeline:
      gap_threshold_seconds: 120
      rolling_short_window: 5
      rolling_medium_window: 15
      rolling_long_window: 30
    lan_sync:
      include_raw: true
      include_meta: true
      include_logs: true
      dry_run: false
