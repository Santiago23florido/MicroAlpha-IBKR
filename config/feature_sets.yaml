      - obv
      - volume_spike_flag
      - accumulation_distribution
      - mfi
    minimum_columns:
      - timestamp
      - symbol
      - last_price
      - volume

  microstructure_core:
    description: Order-book and spread-sensitive indicators for quote-aware datasets.
    families:
      - microstructure
      - intraday_structure
    indicators:
      - spread
      - spread_bps
      - mid_price
      - weighted_mid_price
      - imbalance
      - rolling_imbalance
      - delta_imbalance
      - total_depth
      - depth_ratio
